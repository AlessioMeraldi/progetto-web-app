<!-- script to avoid sending the server a request if an URL below the basepath is inserted -->
<script>
    (function () {
        let path = window.location.pathname;
        let basePath = '/progetto-web-app/';

        // If we're at a path that's not the base and doesn't have a hash, redirect to base
        if (path !== basePath && !window.location.hash) {
            window.location.replace(basePath);
        }
    })();
</script>
